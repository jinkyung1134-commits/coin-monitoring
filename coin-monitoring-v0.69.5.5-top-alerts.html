.legend-row{display:flex;align-items:center;justify-content:space-between;margin:14px 0;color:#fff;font-size:14px}.legend-dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:10px}.legend-name{display:flex;align-items:center}.legend-dot.weak{background:var(--orange)}.legend-dot.medium{background:var(--red)}.legend-dot.strong{background:var(--green);box-shadow:0 0 12px rgba(0,230,118,.4)}.legend-row b{font-size:13px}.guide{color:var(--muted);font-size:12px;line-height:1.85}
.main-panel{min-height:0;display:grid;grid-template-rows:92px 1fr}.panel-top{display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line)}.panel-title{font-size:22px;font-weight:950}.filters{display:flex;align-items:center;gap:10px}.select-like{height:36px;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:#0A0A0A;color:#fff;font-size:13px;font-weight:800}.list-wrap{min-height:0;overflow:auto;padding:0 10px 12px}

::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:999px}::-webkit-scrollbar-track{background:transparent}

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">⌁</div>

<script>
const APP_VERSION = "0.69.2";
const MAX_ROWS = 10;
const DISPLAY_UPDATE_MS = 750;
const REMOVE_HOLD_MS = 1800; // 조건 미달 후 1.8초 회색 유지 후 삭제
const REMOVE_FADE_START_MS = 999999; // 투명도 fade 사용 안 함
const META_REFRESH_MS = 30000;
const ORDERBOOK_REST_MS = 5000;
const MIN_DISPLAY_PERCENT = 0.4;
const MAX_PREMIUM_PERCENT = 30;
const MIN_MAX_AMOUNT_KRW = 700000;
const SCORE_PERCENT_WEIGHT = 0.45;
const SCORE_MAX_AMOUNT_WEIGHT = 0.40;
const SCORE_VOLUME_WEIGHT = 0.15;
const MIN_TURNOVER_KRW = 1000000000;
const DEFAULT_USDT_KRW = 1478;
const FALLBACK_COINS = ["BTC","ETH","XRP","SOL","DOGE","ADA","AVAX","LINK","DOT","TRX","BCH","ETC","APT","ARB","NEAR","SUI","SEI","OP","ATOM"];

const state = {
  usdtKrw: DEFAULT_USDT_KRW,
  btcKrw: 0,
  commonCoins: [],
  prices: { upbit:{}, bithumb:{}, binance:{}, bybit:{}, bitget:{} },
  orderbooks: { upbit:{}, bithumb:{}, binance:{}, bybit:{}, bitget:{} },
  volumes: { upbit:{}, bithumb:{}, binance:{}, bybit:{}, bitget:{} },
  listings: { upbit:new Set(), bithumb:new Set(), binance:new Set(), bybit:new Set(), bitget:new Set() },
  status: { meta:"wait", upbit:"wait", bithumb:"wait", binance:"wait", bybit:"wait", bitget:"wait", btc:"wait", usdt:"wait" },
  sockets: []
};

const $ = id => document.getElementById(id);
const krw = n => Number.isFinite(n) ? Math.round(n).toLocaleString("ko-KR") + "원" : "-";
const usd = n => Number.isFinite(n) ? "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits:0, maximumFractionDigits:4 }) : "-";
const pct = n => Number.isFinite(n) ? n.toFixed(2) + "%" : "-";

function log(msg){
  const text = `[${new Date().toLocaleTimeString()}] ${msg}`;
  $("log").textContent = text;
  setStatus();
}


let activeMode = "reverse";
let latestKimchiRows = [];
let latestReverseRows = [];

function updateModeButtons(){
  activeMode = "reverse";
  const title = $("activeTitle");
  if(title) title.textContent = "국내 → 해외";
  const activeCount = $("activeCount");
  if(activeCount) activeCount.textContent = String(latestReverseRows.length);
}

function switchMode(mode){
  activeMode = "reverse";
  updateModeButtons();
  renderRows($("activeBody"), latestReverseRows, "reverse");
}

document.addEventListener("DOMContentLoaded", () => {
  updateModeButtons();
});






let lastMarketSnapshot = null;

async function fetchMarketIndices(){
  try{
    const targets = [
      { key:"nasdaq", symbol:"^IXIC" },
      { key:"sp500", symbol:"^GSPC" },
      { key:"kospi", symbol:"^KS11" },
      { key:"kosdaq", symbol:"^KQ11" }
    ];

    const results = await Promise.all(targets.map(async item => {
      try{
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(item.symbol)}?range=1d&interval=1d`;
        const res = await fetch(url);
        const json = await res.json();

        const meta = json?.chart?.result?.[0]?.meta;
        if(!meta) return null;

        const current = Number(meta.regularMarketPrice);
        const previous = Number(meta.previousClose);

        let changePct = 0;
        if(Number.isFinite(current) && Number.isFinite(previous) && previous !== 0){
          changePct = ((current - previous) / previous) * 100;
        }

        return {
          key:item.key,
          current,
          changePct
        };
      }catch(e){
        return null;
      }
    }));

    const snapshot = {};
    results.filter(Boolean).forEach(r => snapshot[r.key] = r);

    lastMarketSnapshot = snapshot;
    renderMarketIndices(snapshot);
  }catch(e){
    if(lastMarketSnapshot){
      renderMarketIndices(lastMarketSnapshot);
    }
  }
}

function renderMarketIndices(snapshot){
  if(!snapshot) return;

  Object.values(snapshot).forEach(item => {
    const valueEl = $(`idx-${item.key}`);
    const changeEl = $(`idx-${item.key}-change`);

    if(valueEl){
      valueEl.textContent = Number(item.current).toLocaleString(undefined,{
        maximumFractionDigits:2
      });
    }

    if(changeEl){
      const pct = Number(item.changePct) || 0;

      changeEl.textContent = `${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%`;
      changeEl.className =
        "market-change " +
        (pct > 0 ? "up" : pct < 0 ? "down" : "neutral");
    }
  });
}

async function fetchJson(url){
  const res = await fetch(url, { cache:"no-store" });
  if(!res.ok) throw new Error(res.status + " " + res.statusText);
  return res.json();
}

function exKey(ex){
  return ({Upbit:"upbit", Bithumb:"bithumb", Binance:"binance", Bybit:"bybit", Bitget:"bitget"}[ex] || String(ex || "").toLowerCase());
}

function isDomestic(ex){ return ["Upbit","Bithumb"].includes(ex); }
function isForeign(ex){ return ["Binance","Bybit","Bitget"].includes(ex); }

function toKrwPrice(ex, price){
  if(!Number.isFinite(price) || price <= 0) return NaN;
  return isForeign(ex) ? price * state.usdtKrw : price;
}

function toKrwAmount(ex, price, qty){
  const p = toKrwPrice(ex, price);
  if(!Number.isFinite(p) || !Number.isFinite(qty) || qty <= 0) return 0;
  return p * qty;
}

function getVolumeKrw(ex, coin){
  const v = state.volumes[exKey(ex)]?.[coin] || 0;
  if(!Number.isFinite(v) || v <= 0) return 0;
  return isForeign(ex) ? v * state.usdtKrw : v;
}

function hasEnoughLiquidity(row){
  const buyVolume = getVolumeKrw(row.buyEx, row.coin);
  const sellVolume = getVolumeKrw(row.sellEx, row.coin);
  if(buyVolume === 0 && sellVolume === 0) return true; // 초기 수신 구간 차단 방지
  return buyVolume >= MIN_TURNOVER_KRW && sellVolume >= MIN_TURNOVER_KRW;
}

function bookToBuyCandidate(ex, coin){
  // 매수 기준 = 해당 거래소 매도 1호가(ask) × 해당 매도 1호가 수량(askQty)
  const key = exKey(ex);
  const book = state.orderbooks[key]?.[coin];
  const ask = Number(book?.ask);
  const askQty = Number(book?.askQty || 0);

  // 수량이 없는 티커 가격만으로는 최대거래가능금액을 계산하지 않음
  if(!Number.isFinite(ask) || ask <= 0) return null;
  if(!Number.isFinite(askQty) || askQty <= 0) return null;

  return {
    ex,
    price:toKrwPrice(ex, ask),
    rawPrice:ask,
    askQty,
    maxAmount:toKrwAmount(ex, ask, askQty)
  };
}

function bookToSellCandidate(ex, coin){
  const key = exKey(ex);
  const book = state.orderbooks[key]?.[coin];
  const fallback = state.prices[key]?.[coin];
  const bid = Number(book?.bid ?? fallback);
  if(!Number.isFinite(bid) || bid <= 0) return null;
  return { ex, price:toKrwPrice(ex, bid), rawPrice:bid };
}

function getDomesticBuyCandidates(coin){ return [bookToBuyCandidate("Upbit",coin), bookToBuyCandidate("Bithumb",coin)].filter(Boolean); }
function getDomesticSellCandidates(coin){ return [bookToSellCandidate("Upbit",coin), bookToSellCandidate("Bithumb",coin)].filter(Boolean); }
function getForeignBuyCandidates(coin){ return [bookToBuyCandidate("Binance",coin), bookToBuyCandidate("Bybit",coin), bookToBuyCandidate("Bitget",coin)].filter(Boolean); }
function getForeignSellCandidates(coin){ return [bookToSellCandidate("Binance",coin), bookToSellCandidate("Bybit",coin), bookToSellCandidate("Bitget",coin)].filter(Boolean); }

function isValidOpportunity(diff, percent){
  return Number.isFinite(diff) && Number.isFinite(percent) && diff > 0 && percent >= MIN_DISPLAY_PERCENT && percent <= MAX_PREMIUM_PERCENT;
}

function rowKey(row){
  return `${row.coin}|${row.buyEx}|${row.sellEx}`;
}

function dedupeRows(rows){
  const map = new Map();
  for(const row of rows){
    const key = rowKey(row);
    const old = map.get(key);
    if(!old || row.percent > old.percent) map.set(key, row);
  }
  return [...map.values()];
}

const COINGECKO_ICON_CACHE_KEY = "coin-monitoring-coingecko-icon-cache-v1";
const coinIconCache = new Map();
const resolvingIconSymbols = new Set();
const missingIconSymbols = new Set();

function badgeText(symbol){
  const s = String(symbol || "").toUpperCase();
  return s.length <= 3 ? s : s.slice(0, 2);
}

function restoreCoinIconCache(){
  try{
    const raw = localStorage.getItem(COINGECKO_ICON_CACHE_KEY);
    if(!raw) return;

    const data = JSON.parse(raw);
    if(!data) return;

    Object.entries(data.icons || {}).forEach(([symbol, url]) => {
      if(symbol && url) coinIconCache.set(symbol, url);
    });

    (data.missing || []).forEach(symbol => {
      if(symbol) missingIconSymbols.add(symbol);
    });
  }catch(e){}
}

function saveCoinIconCache(){
  try{
    localStorage.setItem(COINGECKO_ICON_CACHE_KEY, JSON.stringify({
      icons:Object.fromEntries(coinIconCache.entries()),
      missing:[...missingIconSymbols],
      savedAt:Date.now()
    }));
  }catch(e){}
}

function coinHtml(symbol){
  const safe = String(symbol || "").toUpperCase().replace(/"/g,"");
  const cached = coinIconCache.get(safe);

  if(cached){
    return `

        </span>

    `;
  }

  queueCoinIconResolve(safe);

        ${coinBadgeHtml(safe)}
      </span>

function applyResolvedIcon(symbol, url){
  document.querySelectorAll(`[data-coin-icon-wrap="${symbol}"]`).forEach(el => {
    el.innerHTML = `<img class="coin-icon" src="${url}" loading="eager" onerror="this.parentElement.innerHTML='${coinBadgeHtml(symbol)}'">`;
  });
}

async function resolveCoinIcon(symbol){
  const s = String(symbol || "").toUpperCase();
  if(!s || coinIconCache.has(s) || missingIconSymbols.has(s)) return;

  try{
    const data = await fetchJson(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(s)}`);
    const coins = Array.isArray(data?.coins) ? data.coins : [];

    const exact = coins.find(c => String(c.symbol || "").toUpperCase() === s);
    const picked = exact || coins[0];
    const url = picked?.large || picked?.thumb || picked?.small;

    if(url){
      coinIconCache.set(s, url);
      applyResolvedIcon(s, url);
      saveCoinIconCache();
    }else{
      missingIconSymbols.add(s);
      saveCoinIconCache();
    }
  }catch(e){
    // API 제한/네트워크 오류면 missing으로 확정하지 않고 다음 렌더에서 다시 시도 가능하게 둠
  }
}

function queueCoinIconResolve(symbol){
  const s = String(symbol || "").toUpperCase();
  if(!s || coinIconCache.has(s) || missingIconSymbols.has(s) || resolvingIconSymbols.has(s)) return;

  resolvingIconSymbols.add(s);

  // 여러 코인이 한 번에 표시될 때 CoinGecko 요청이 몰리지 않도록 지연
  const delay = 120 + resolvingIconSymbols.size * 180;
  setTimeout(async () => {
    try{
      await resolveCoinIcon(s);
    }finally{
      resolvingIconSymbols.delete(s);
    }
  }, delay);
}

function warmupVisibleCoinIcons(rows){
  const symbols = [...new Set((rows || []).map(r => r.coin).filter(Boolean))].slice(0, 30);
  symbols.forEach(queueCoinIconResolve);
}

const smoothDisplayRows = {
  kimchi:new Map(),
  reverse:new Map()
};

const SMOOTH_FACTOR = 1;
const NUMBER_EASING = 0.16; // 숫자 60fps 부드러운 추종

function smoothKey(row){
  return `${row.coin}|${row.buyEx}|${row.sellEx}`;
}

function smoothNumber(current, target){
  if(!Number.isFinite(target)) return target;
  if(!Number.isFinite(current)) return target;
  const next = current + (target - current) * SMOOTH_FACTOR;
  if(Math.abs(next - target) < Math.max(1, Math.abs(target) * 0.001)) return target;
  return next;
}


function recalcRoutePercent(row){
  if(!row || !row.coin || !row.buyEx || !row.sellEx) return row;

  const buy = bookToBuyCandidate(row.buyEx, row.coin);
  const sell = bookToSellCandidate(row.sellEx, row.coin);

  if(!buy || !sell || !Number.isFinite(buy.price) || !Number.isFinite(sell.price) || buy.price <= 0){
    return row;
  }

  const diff = sell.price - buy.price;
  const percent = diff / buy.price * 100;

  return {
    ...row,
    buyPrice:buy.price,
    sellPrice:sell.price,
    maxAmount:Number.isFinite(buy.maxAmount) && buy.maxAmount > 0 ? buy.maxAmount : row.maxAmount,
    diff,
    percent
  };
}

function smoothRowsForDisplay(rows, type){
  const now = Date.now();
  const map = smoothDisplayRows[type];
  const keys = new Set();

  const liveRows = (rows || []).map(row => {
    const key = smoothKey(row);
    keys.add(key);

    const old = map.get(key);
    const display = old ? {
      buyPrice:smoothNumber(old.buyPrice, row.buyPrice),
      maxAmount:smoothNumber(old.maxAmount, row.maxAmount),
      percent:smoothNumber(old.percent, row.percent),
      lastRow:row,
      lastSeenAt:now,
      fading:false,
      fadeRatio:0
    } : {
      buyPrice:row.buyPrice,
      maxAmount:row.maxAmount,
      percent:row.percent,
      lastRow:row,
      lastSeenAt:now,
      fading:false,
      fadeRatio:0
    };

    map.set(key, display);

    return {
      ...row,
      displayBuyPrice:display.buyPrice,
      displayMaxAmount:display.maxAmount,
      displayPercent:display.percent,
      fading:false,
      fadeRatio:0
    };
  });

  const fadingRows = [];

  for(const [key, old] of [...map.entries()]){
    if(keys.has(key)) continue;

    const elapsed = now - Number(old.lastSeenAt || 0);

    if(elapsed > REMOVE_HOLD_MS){
      map.delete(key);
      continue;
    }

    const fadeRatio = 0;
    const lastRow = old.lastRow;
    if(!lastRow) continue;

    // 유예 상태에서도 퍼센트는 현재 호가 기준으로 즉시 다시 계산해서 표시한다.
    // 매수가/최대거래가능금액은 기존처럼 부드럽게 표시값을 유지한다.
    const liveRow = recalcRoutePercent(lastRow);

    fadingRows.push({
      ...liveRow,
      displayBuyPrice:old.buyPrice,
      displayMaxAmount:old.maxAmount,
      displayPercent:liveRow.percent,
      fading:true,
      fadeRatio
    });
  }

  // 현재 조건 충족 행 먼저, 사라지는 행은 아래쪽에 유지
  return [...liveRows, ...fadingRows].slice(0, MAX_ROWS);
}


const numberAnimationState = new Map();
const numberLastSeenAt = new Map();
let numberAnimationStarted = false;

function numberKey(row, field){
  return `${row.coin}|${row.buyEx}|${row.sellEx}|${field}`;
}

function setAnimatedNumberTarget(key, value, formatter){
  if(!Number.isFinite(value)) return formatter(value);

  const old = numberAnimationState.get(key);
  if(!old){
    numberAnimationState.set(key, {
      current:value,
      target:value,
      formatter
    });
  }else{
    old.target = value;
    old.formatter = formatter;
  }

  return `<span class="animated-number" data-number-key="${key}">${formatter(numberAnimationState.get(key).current)}</span>`;
}

function animateNumbers(){
  try{
    for(const [key, item] of numberAnimationState.entries()){
      if(!item) continue;

      const current = Number(item.current);
      const target = Number(item.target);

      if(!Number.isFinite(current) || !Number.isFinite(target)){
        item.current = target;
      }else{
        const next = current + (target - current) * NUMBER_EASING;
        item.current = Math.abs(target - next) < Math.max(1, Math.abs(target) * 0.0006) ? target : next;
      }

      document.querySelectorAll(`[data-number-key="${CSS.escape(key)}"]`).forEach(el => {
        el.textContent = item.formatter(item.current);
      });
    }
  }catch(e){
    console.error("number animation error", e);
  }

  requestAnimationFrame(animateNumbers);
}

function startNumberAnimation(){
  if(numberAnimationStarted) return;
  numberAnimationStarted = true;
  requestAnimationFrame(animateNumbers);
}

function animatedPriceDualHtml(row, value){
  const keyKrw = numberKey(row, "buyPriceKrw");
  const keyUsd = numberKey(row, "buyPriceUsd");
  const krwHtml = setAnimatedNumberTarget(keyKrw, value, krw);

  if(Number.isFinite(value) && Number.isFinite(state.usdtKrw) && state.usdtKrw > 0){
    const usdHtml = setAnimatedNumberTarget(keyUsd, value / state.usdtKrw, usd);
    return `<div class="price-dual"><span>${krwHtml}</span><span class="usd">${usdHtml}</span></div>`;
  }

  return krwHtml;
}

function animatedKrwHtml(row, field, value){
  return setAnimatedNumberTarget(numberKey(row, field), value, krw);
}


function percentClass(percent){
  const p = Number(percent);

  if(!Number.isFinite(p)) return "";

  // 공통 기준
  // 0.40 ~ 0.69 : orange
  // 0.70 ~ 0.99 : red
  // 1.00+       : green glow
  if(p >= 1.0) return "pct-strong";
  if(p >= 0.7) return "pct-medium";
  return "pct-weak";
}

function animatedPctHtml(row, value){
  // 퍼센트는 보간/보정 없이 실제 계산값을 즉시 표시
  return pct(value);
}


function cleanupNumberAnimationKeys(rows){
  const now = Date.now();
  const alive = new Set();

  (rows || []).slice(0, MAX_ROWS).forEach(row => {
    ["buyPriceKrw","buyPriceUsd","maxAmount"].forEach(field => {
      const key = numberKey(row, field);
      alive.add(key);
      numberLastSeenAt.set(key, now);
    });
  });

  for(const key of [...numberAnimationState.keys()]){
    const lastSeen = numberLastSeenAt.get(key) || 0;
    if(!alive.has(key) && now - lastSeen > 5000){
      numberAnimationState.delete(key);
      numberLastSeenAt.delete(key);
    }
  }
}

function renderRows(el, rows, type){
  if(!el) return;

  if(!rows.length){
    const emptyHtml = `<tr><td colspan="6" class="empty">&nbsp;</td></tr>`;
    if(el.innerHTML !== emptyHtml) el.innerHTML = emptyHtml;
    return;
  }

  rows = smoothRowsForDisplay(rows, type);
  const html = rows.slice(0, MAX_ROWS).map((r, idx) => `
    <tr class="${r.fading ? 'fading-row' : ''}">
      <td class="coin">${coinHtml(r.coin)}</td>
      <td>${exchangeHtml(r.buyEx)}</td>
      <td class="num">${animatedPriceDualHtml(r, r.buyPrice)}</td>
      <td>${exchangeHtml(r.sellEx)}</td>
      <td class="num">${animatedKrwHtml(r, "maxAmount", r.maxAmount)}</td>
      <td class="num ${r.fading ? "" : percentClass(r.percent)}">${animatedPctHtml(r, r.percent)}</td>
    </tr>
  `).join("");

  cleanupNumberAnimationKeys(rows);

  if(html !== lastKimchiHtml){
    el.innerHTML = html;
    lastKimchiHtml = html;
    saveRenderCache();
  }
}




// 입출금 제한 코인 제외 목록
// 브라우저 단독 HTML에서는 거래소별 입출금 상태 API가 인증/CORS 제한이 있어
// 아래 리스트 기반으로 우선 필터링한다.
// 형식: 거래소키: { deposit: Set([...입금금지]), withdraw: Set([...출금금지]) }
const TRANSFER_BLOCKED = {
  upbit:   { deposit:new Set([]), withdraw:new Set([]) },
  bithumb: { deposit:new Set([]), withdraw:new Set([]) },
  binance: { deposit:new Set([]), withdraw:new Set([]) },
  bybit:   { deposit:new Set([]), withdraw:new Set([]) },
  bitget:  { deposit:new Set([]), withdraw:new Set([]) }
};

function transferBlocked(ex, coin, side){
  const key = exKey(ex);
  const symbol = String(coin || "").toUpperCase();
  const bucket = TRANSFER_BLOCKED[key]?.[side];
  return !!bucket && bucket.has(symbol);
}

function passesTransferFilter(row){
  // 실제 이동 방향 기준:
  // 매수 거래소에서는 출금 가능해야 하고, 매도 거래소에서는 입금 가능해야 한다.
  // 국내 -> 해외 역프든 해외 -> 국내 김프든 같은 규칙으로 처리 가능.
  if(transferBlocked(row.buyEx, row.coin, "withdraw")) return false;
  if(transferBlocked(row.sellEx, row.coin, "deposit")) return false;
  return true;
}

// 기존 함수명 호환
function passesWithdrawalFilter(row){
  return passesTransferFilter(row);
}


function clamp01(v){
  return Math.max(0, Math.min(1, Number(v) || 0));
}

function scoreByRow(row){
  const buyVolume = getVolumeKrw(row.buyEx, row.coin);
  const sellVolume = getVolumeKrw(row.sellEx, row.coin);
  const minVolume = Math.min(buyVolume || 0, sellVolume || 0);

  const percentScore = clamp01(row.percent / 5);
  const amountScore = clamp01(row.maxAmount / 5000000);
  const volumeScore = clamp01(minVolume / 50000000000);

  return percentScore * SCORE_PERCENT_WEIGHT
    + amountScore * SCORE_MAX_AMOUNT_WEIGHT
    + volumeScore * SCORE_VOLUME_WEIGHT;
}


let soundEnabled = true;
let audioCtx = null;
const seenOpportunityKeys = {
  kimchi:new Set(),
  reverse:new Set()
};

function enableAlertSound(){
  soundEnabled = true;
  try{
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
  }catch(e){}
  if(typeof updateSoundButton === "function") updateSoundButton();
}

document.addEventListener("click", enableAlertSound, { once:true });
document.addEventListener("keydown", enableAlertSound, { once:true });

function playOpportunitySound(){
  if(!soundEnabled) return;

  try{
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1320, now + 0.08);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.08, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.18);
  }catch(e){}
}


function updateSoundButton(){
  const btn = $("soundToggle");
  const txt = null;
  if(btn){

    btn.className = "tool-btn " + (soundEnabled ? "sound-on" : "sound-off");
  }

}

    });

function opportunitySoundKey(row){
  return `${row.coin}|${row.buyEx}|${row.sellEx}`;
}

function checkNewOpportunities(type, rows){
  const current = new Set();

  (rows || []).slice(0, MAX_ROWS).forEach(row => {
    const key = opportunitySoundKey(row);
    current.add(key);

    if(!seenOpportunityKeys[type].has(key)){
      seenOpportunityKeys[type].add(key);
      playOpportunitySound();
      addAlertLog(type, row);
    }
  });

  // 현재 목록에서 완전히 빠진 것은 나중에 다시 들어오면 다시 알림 가능
  for(const key of [...seenOpportunityKeys[type]]){
    if(!current.has(key)) seenOpportunityKeys[type].delete(key);
  }
}

function calculate(){
  const kimchi = [];
  const reverse = [];

  for(const coin of state.commonCoins){
    const foreignBuyList = getForeignBuyCandidates(coin);
    const foreignSellList = getForeignSellCandidates(coin);
    const domesticBuyList = getDomesticBuyCandidates(coin);
    const domesticSellList = getDomesticSellCandidates(coin);

    for(const buy of foreignBuyList){
      for(const sell of domesticSellList){
        const row = { coin, buyEx:buy.ex, buyPrice:buy.price, sellEx:sell.ex, sellPrice:sell.price, maxAmount:buy.maxAmount };
        row.diff = row.sellPrice - row.buyPrice;
        row.percent = row.diff / row.buyPrice * 100;
        if(!isValidOpportunity(row.diff, row.percent)) continue;
        if(!Number.isFinite(row.maxAmount) || row.maxAmount < MIN_MAX_AMOUNT_KRW) continue;
        if(!passesTransferFilter(row)) continue;
        if(!hasEnoughLiquidity(row)) continue;
        row.score = scoreByRow(row);
        kimchi.push(row);
      }
    }

    for(const buy of domesticBuyList){
      for(const sell of foreignSellList){
        const row = { coin, buyEx:buy.ex, buyPrice:buy.price, sellEx:sell.ex, sellPrice:sell.price, maxAmount:buy.maxAmount };
        row.diff = row.sellPrice - row.buyPrice;
        row.percent = row.diff / row.buyPrice * 100;
        if(!isValidOpportunity(row.diff, row.percent)) continue;
        if(!Number.isFinite(row.maxAmount) || row.maxAmount < MIN_MAX_AMOUNT_KRW) continue;
        if(!passesTransferFilter(row)) continue;
        if(!hasEnoughLiquidity(row)) continue;
        row.score = scoreByRow(row);
        reverse.push(row);
      }
    }
  }

  const kimchiRows = dedupeRows(kimchi).sort((a,b)=>(b.score||0)-(a.score||0) || b.percent-a.percent);
  const reverseRows = dedupeRows(reverse).sort((a,b)=>(b.score||0)-(a.score||0) || b.percent-a.percent);
  warmupVisibleCoinIcons(reverseRows);
  updateCounts(kimchiRows, reverseRows);
  checkNewOpportunities("reverse", reverseRows);

  renderRows($("activeBody"), reverseRows, "reverse");
}

async function loadCommonCoins(){
  try{
    log("공통 상장 목록 확인중...");
    const [upbitRes, bithumbRes, binanceRes, bybitRes, bitgetRes] = await Promise.allSettled([
      fetchJson("https://api.upbit.com/v1/market/all?isDetails=false"),
      fetchJson("https://api.bithumb.com/public/ticker/ALL_KRW"),
      fetchJson("https://api.binance.com/api/v3/exchangeInfo"),
      fetchJson("https://api.bybit.com/v5/market/instruments-info?category=spot"),
      fetchJson("https://api.bitget.com/api/v2/spot/public/symbols")
    ]);

    const upbit = new Set(), bithumb = new Set(), binance = new Set(), bybit = new Set(), bitget = new Set();

    if(upbitRes.status === "fulfilled"){
      upbitRes.value.filter(m => m.market?.startsWith("KRW-")).forEach(m => upbit.add(m.market.replace("KRW-","").toUpperCase()));
    }
    if(bithumbRes.status === "fulfilled" && bithumbRes.value?.data){
      Object.keys(bithumbRes.value.data).filter(k => k !== "date").forEach(k => bithumb.add(k.toUpperCase()));
    }
    if(binanceRes.status === "fulfilled" && Array.isArray(binanceRes.value?.symbols)){
      binanceRes.value.symbols.filter(s => s.status === "TRADING" && s.quoteAsset === "USDT").forEach(s => binance.add(s.baseAsset.toUpperCase()));
    }
    if(bybitRes.status === "fulfilled" && Array.isArray(bybitRes.value?.result?.list)){
      bybitRes.value.result.list.filter(s => s.status === "Trading" && s.quoteCoin === "USDT").forEach(s => bybit.add(s.baseCoin.toUpperCase()));
    }
    if(bitgetRes.status === "fulfilled" && Array.isArray(bitgetRes.value?.data)){
      bitgetRes.value.data.filter(s => s.quoteCoin === "USDT").forEach(s => bitget.add(s.baseCoin.toUpperCase()));
    }

    state.listings = { upbit, bithumb, binance, bybit, bitget };

    const domestic = new Set([...upbit, ...bithumb]);
    const foreign = new Set([...binance, ...bybit, ...bitget]);
    state.commonCoins = [...domestic].filter(c => foreign.has(c));

    if(state.commonCoins.length < 5){
      state.commonCoins = FALLBACK_COINS;
      log("상장 목록 일부 실패 · 기본 목록 사용");
    }else{
      log(`공통 코인 ${state.commonCoins.length}개 확인 완료`);
    }

    setServiceStatus("meta","ok");
  }catch(e){
    state.commonCoins = FALLBACK_COINS;
    setServiceStatus("meta","error");
    log("공통 상장 목록 실패 · 기본 목록 사용");
  }
}

async function refreshBithumbOrderbooks(){
  const coins = state.commonCoins.filter(c => state.listings.bithumb.has(c));
  const chunkSize = 12;

  for(let i = 0; i < coins.length; i += chunkSize){
    const chunk = coins.slice(i, i + chunkSize);

    await Promise.allSettled(chunk.map(async coin => {
      try{
        const data = await fetchJson(`https://api.bithumb.com/public/orderbook/${coin}_KRW?count=1`);
        const d = data?.data || {};

        const asks = Array.isArray(d.asks) ? d.asks : [];
        const bids = Array.isArray(d.bids) ? d.bids : [];

        const ask = asks[0];
        const bid = bids[0];

        const askPrice = Number(ask?.price ?? ask?.[0]);
        const askQty = Number(ask?.quantity ?? ask?.qty ?? ask?.size ?? ask?.[1]);
        const bidPrice = Number(bid?.price ?? bid?.[0]);
        const bidQty = Number(bid?.quantity ?? bid?.qty ?? bid?.size ?? bid?.[1]);

        if(Number.isFinite(askPrice) && askPrice > 0 && Number.isFinite(bidPrice) && bidPrice > 0){
          state.orderbooks.bithumb[coin] = {
            ask:askPrice,
            askQty:Number.isFinite(askQty) && askQty > 0 ? askQty : 0,
            bid:bidPrice,
            bidQty:Number.isFinite(bidQty) && bidQty > 0 ? bidQty : 0
          };
        }
      }catch(e){}
    }));

    // 브라우저/거래소 요청 제한 완화
    await new Promise(resolve => setTimeout(resolve, 80));
  }
}

    restoreRenderCache();
    setStatus();
    await loadCommonCoins();
    await Promise.allSettled([updateHeaderFromBithumb(), refreshVolumes(), refreshBithumbOrderbooks()]);

    connectUpbit();
    connectBithumb();
    connectBinance();
    connectBybit();
    connectBitget();

    setInterval(calculate, DISPLAY_UPDATE_MS);
    startNumberAnimation();
    setInterval(updateHeaderFromBithumb, META_REFRESH_MS);
    setInterval(refreshVolumes, META_REFRESH_MS);
    setInterval(refreshBithumbOrderbooks, ORDERBOOK_REST_MS);
    setTimeout(calculate, 1000);
  }catch(e){
    console.error(e);
    log("시작 오류: " + e.message);
    setServiceStatus("meta","error");
  }
}

start();
</script>
