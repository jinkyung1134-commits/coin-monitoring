<style>
:root{
  --bg:#0A0A0A;
  --panel:#111111;
  --panel2:#1A1A1A;

  --text:#F3F6FB;

  --red:#FF5252;

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter','Pretendard',sans-serif;
  overflow:hidden;
  letter-spacing:-0.02em;

.header{

  display:flex;
  justify-content:space-between;

.left-header{

}

.title-row{

  gap:10px;
}

.title{

  font-weight:800;
}

.version{
  font-size:13px;

}

.info{

}

}

.status{

}

.dot{

}

.dot.ok{

}

.dot.bad{

  box-shadow:0 0 10px rgba(255,92,122,0.5);
}

.dot.maintenance{
  background:var(--yellow);
  box-shadow:0 0 10px rgba(255,209,102,0.5);
}

.dot.wait{
  background:#8C97A8;
  box-shadow:0 0 10px rgba(140,151,168,0.35);
}

.main{
  height:calc(100vh - 78px);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  padding:18px;
}

.panel{
  background:linear-gradient(180deg,#111111 0%, #16181D 100%);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;

.panel-header{

.panel-title{

}

.panel-sub,
.sub{

  color:var(--muted);
}

.table-wrap{
  overflow:auto;
  flex:1;
  min-height:0;
}

table{
  width:100%;

}

thead{
  position:sticky;
  top:0;
  z-index:10;
}

th{

  font-weight:700;

td{

tr:hover{

.green{

.red{

<div class="header">

<div class="panel-title">

<script>

const APP_VERSION = "0.63.13";
let COMMON_COINS = [];
const FALLBACK_COINS = ["BTC","ETH","XRP","SOL","DOGE","ADA","AVAX","LINK","DOT","TRX","BCH","ETC","APT","ARB","NEAR","SUI","SEI","OP","ATOM"];
const MAX_ROWS = 10;
const MIN_DIFF_KRW = 1;
const MAX_PREMIUM_PERCENT = 30; // 30% 초과는 동일 코인 의심으로 제외

// v0.63.5 거래량/거래대금 필터
// 국내/해외 양쪽 거래소 모두 24시간 거래대금이 기준 이상이어야 표시
const MIN_DOMESTIC_VOLUME_KRW = 500_000_000;   // 국내 24h 거래대금 5억원 이상
const MIN_FOREIGN_VOLUME_KRW = 500_000_000;    // 해외 24h 거래대금 원화 환산 5억원 이상

function exchangeKey(ex){
  return String(ex || "").toLowerCase();
}

function getVolumeKrw(ex, coin){
  const key = exchangeKey(ex);
  const v = state.volumes?.[key]?.[coin];
  if(!Number.isFinite(v) || v <= 0) return 0;

  // 해외 거래소는 USDT 거래대금 기준이므로 원화 환산
  if(["binance","bybit","okx","bitget"].includes(key)){
    return v * state.usdtKrw;
  }

  return v;
}

function isDomesticExchange(ex){
  return ["Upbit","Bithumb"].includes(ex);
}

function isForeignExchange(ex){
  return ["Binance","Bybit","OKX","Bitget"].includes(ex);
}

function hasEnoughLiquidity(row){
  const buyVolume = getVolumeKrw(row.buyEx, row.coin);
  const sellVolume = getVolumeKrw(row.sellEx, row.coin);

  const buyMin = isDomesticExchange(row.buyEx) ? MIN_DOMESTIC_VOLUME_KRW : MIN_FOREIGN_VOLUME_KRW;
  const sellMin = isDomesticExchange(row.sellEx) ? MIN_DOMESTIC_VOLUME_KRW : MIN_FOREIGN_VOLUME_KRW;

  return buyVolume >= buyMin && sellVolume >= sellMin;
}


// v0.63.5 실거래 노출 가중치
const EXCHANGE_WEIGHT = {
  Upbit: 0.55,
  Bithumb: 1.00,
  Binance: 1.00,
  Bybit: 0.95,
  Bitget: 0.90,
  OKX: 0.75
};

function exposureScore(row){
  return row.percent
    * (EXCHANGE_WEIGHT[row.buyEx] ?? 1)
    * (EXCHANGE_WEIGHT[row.sellEx] ?? 1);
}

// v0.63.5 목록 깜빡임 방지 유예시간
const GRACE_HOLD_MS = {
  kimchi: 10000,
  reverse: 15000
};

const opportunityCache = {
  kimchi: new Map(),
  reverse: new Map()
};

function normalizeText(v){
  return String(v || "").trim().toUpperCase();
}

function opportunityKey(row){
  // 같은 코인/같은 매수거래소/같은 매도거래소가 중복 표시되지 않도록 표준화
  return `${normalizeText(row.coin)}|${normalizeText(row.buyEx)}|${normalizeText(row.sellEx)}`;
}

function dedupeRows(rows, type){
  const map = new Map();

  rows.forEach(row => {
    const key = opportunityKey(row);
    const old = map.get(key);

    if(!old){
      map.set(key, row);
      return;
    }

    // 실시간 양수 행을 유예 행보다 우선 표시
    if(old.grace && !row.grace){
      map.set(key, row);
      return;
    }

    if(!old.grace && row.grace) return;

    // 같은 조건이면 표시 기준이 더 높은 행만 유지
    const oldScore = type === "reverse" ? exposureScore(old) : old.percent;
    const newScore = type === "reverse" ? exposureScore(row) : row.percent;
    if(newScore > oldScore) map.set(key, row);
  });

  return [...map.values()];
}

function applyGraceRows(type, currentRows){
  const now = Date.now();
  const cache = opportunityCache[type];
  const currentKeys = new Set();

  currentRows.forEach(row => {
    const key = opportunityKey(row);
    currentKeys.add(key);
    cache.set(key, {
      ...row,
      lastPositiveAt: now,
      grace: false
    });
  });

  for(const [key, cached] of cache.entries()){
    if(currentKeys.has(key)) continue;

    const [coin, buyEx, sellEx] = key.split("|");
    const d = getDomesticBest(coin);
    const foreignBuy = getForeignForBuy(coin);
    const foreignSell = getForeignForSell(coin);

    if(!d || !foreignBuy || !foreignSell){
      cache.delete(key);
      continue;
    }

    let liveRow = null;

    if(type === "kimchi"){
      const diff = d.high.price - foreignBuy.price;
      const percent = diff / foreignBuy.price * 100;
      liveRow = {
        coin,
        buyEx: foreignBuy.ex,
        buyPrice: foreignBuy.price,
        sellEx: d.high.ex,
        sellPrice: d.high.price,
        diff,
        percent,
        grace: true
      };
    }else{
      const diff = foreignSell.price - d.low.price;
      const percent = diff / d.low.price * 100;
      liveRow = {
        coin,
        buyEx: d.low.ex,
        buyPrice: d.low.price,
        sellEx: foreignSell.ex,
        sellPrice: foreignSell.price,
        diff,
        percent,
        grace: true
      };
    }

    const stillSameRoute = opportunityKey(liveRow) === key;
    const withinGrace = now - cached.lastPositiveAt <= GRACE_HOLD_MS[type];

    if(stillSameRoute && liveRow.percent <= 0 && withinGrace){
      currentRows.push(liveRow);
    }else if(liveRow.percent > 0){
      cache.set(key, {
        ...liveRow,
        lastPositiveAt: now,
        grace: false
      });
      currentRows.push({...liveRow, grace:false});
    }else{
      cache.delete(key);
    }
  }

  return currentRows;
}


const state = {
  usdtKrw: 1478,
  usdtSource: "",
  btc: 0,
  prices: { upbit:{}, bithumb:{}, binance:{}, bybit:{}, okx:{}, bitget:{} },
  volumes: { upbit:{}, bithumb:{}, binance:{}, bybit:{}, okx:{}, bitget:{} },
  ok: { upbit:false, bithumb:false, binance:false, bybit:false, okx:false, bitget:false, usdt:false, btc:false },
  status: { upbit:"wait", bithumb:"wait", binance:"wait", bybit:"wait", okx:"wait", bitget:"wait", usdt:"wait", btc:"wait" },
  sockets: []
};

const $ = id => document.getElementById(id);
const krw = n => Number.isFinite(n) ? Math.round(n).toLocaleString("ko-KR") + "원" : "-";
const rateText = n => Number.isFinite(n) ? Math.round(n).toLocaleString("ko-KR") : "-";
const usd = n => Number.isFinite(n) ? "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: n >= 1 ? 4 : 8 }) : "-";
const pct = n => Number.isFinite(n) ? n.toFixed(3) + "%" : "-";
const log = msg => {
  const text = `[${new Date().toLocaleTimeString()}] ${msg}`;
  $("log").textContent = text;
  const tooltip = $("statusTooltip");
  if(tooltip){
    tooltip.textContent = getStatusText(text);
  }
};

function setServiceStatus(key, status){
  if(!state.status) state.status = {};
  state.status[key] = status;
  state.ok[key] = status === "ok";
  setStatus();
}

function statusLabel(status){
  if(status === "ok") return "정상";
  if(status === "error") return "오류";
  return "연결중/대기";
}

function statusIcon(status){
  if(status === "ok") return "🟢";
  if(status === "error") return "🔴";
  return "⚪";
}

function getServiceStatus(key){
  if(state.status?.[key]) return state.status[key];
  return state.ok?.[key] ? "ok" : "wait";
}

function getStatusText(lastLogText = ""){
  const names = {
    upbit:"Upbit", bithumb:"Bithumb",
    binance:"Binance", bybit:"Bybit", okx:"OKX", bitget:"Bitget",
    usdt:"USDT", btc:"BTC"
  };

  const lines = Object.keys(names).map(key => {
    const status = getServiceStatus(key);
    return `${names[key] || key}  ${statusIcon(status)}`;
  });

  if(lastLogText) lines.push("", `최근 로그: ${lastLogText}`);
  return lines.join("\n");
}

function setStatus(){
  const dot = $("statusDot");
  const statuses = Object.keys(state.ok).map(getServiceStatus);
  const allOk = statuses.every(s => s === "ok");
  const hasError = statuses.some(s => s === "error");

  let cls = "wait";
  if(allOk) cls = "ok";
  else if(hasError) cls = "bad";

  dot.className = "dot " + cls;

  const tooltipText = getStatusText($("log")?.textContent || "");
  const tooltip = $("statusTooltip");
  if(tooltip) tooltip.textContent = tooltipText;
}

async function fetchJson(url){
  const res = await fetch(url, { cache:"no-store" });
  if(!res.ok) throw new Error(res.status + " " + res.statusText);
  return res.json();
}

function getDomesticBest(coin){
  const candidates = [];
  if(state.prices.upbit[coin]) candidates.push({ex:"Upbit", price:state.prices.upbit[coin]});
  if(state.prices.bithumb[coin]) candidates.push({ex:"Bithumb", price:state.prices.bithumb[coin]});
  if(!candidates.length) return null;
  candidates.sort((a,b)=>b.price-a.price);
  return { high:candidates[0], low:[...candidates].sort((a,b)=>a.price-b.price)[0] };
}

function getForeignCandidates(coin){
  const candidates = [];
  if(state.prices.binance[coin]) candidates.push({ex:"Binance", usd:state.prices.binance[coin]});
  if(state.prices.bybit[coin]) candidates.push({ex:"Bybit", usd:state.prices.bybit[coin]});
  if(state.prices.okx[coin]) candidates.push({ex:"OKX", usd:state.prices.okx[coin]});
  if(state.prices.bitget[coin]) candidates.push({ex:"Bitget", usd:state.prices.bitget[coin]});
  return candidates;
}

function getForeignForBuy(coin){
  // 해외 거래소 USDT 가격을 국내 USDT 가격으로 원화 환산
  const candidates = getForeignCandidates(coin).map(x => ({
    ex:x.ex,
    price:x.usd * state.usdtKrw,
    usd:x.usd
  }));
  if(!candidates.length) return null;
  candidates.sort((a,b)=>a.price-b.price);
  return candidates[0];
}

function getForeignForSell(coin){
  // 해외 거래소 USDT 가격을 국내 USDT 가격으로 원화 환산
  const candidates = getForeignCandidates(coin).map(x => ({
    ex:x.ex,
    price:x.usd * state.usdtKrw,
    usd:x.usd
  }));
  if(!candidates.length) return null;
  candidates.sort((a,b)=>b.price-a.price);
  return candidates[0];
}

function isValidOpportunity(diff, percent){
  if(!Number.isFinite(diff) || !Number.isFinite(percent)) return false;
  if(diff < MIN_DIFF_KRW) return false;
  // 티커명만 같은 다른 코인/프리마켓/네트워크 불일치 의심값 제외
  if(percent <= 0 || percent > MAX_PREMIUM_PERCENT) return false;
  return true;
}

  BTC:"btc", ETH:"eth", XRP:"xrp", SOL:"sol", DOGE:"doge", ADA:"ada",
  AVAX:"avax", LINK:"link", DOT:"dot", TRX:"trx", BCH:"bch", ETC:"etc",
  LTC:"ltc", APT:"apt", ARB:"arb", NEAR:"near", SUI:"sui", SEI:"sei",

// 거래소에는 아이콘이 있지만 공개 아이콘 패키지에 없는 코인은
// CoinGecko Search API로 자동 보강하고, 실패하면 티커 배지로 표시
const iconUrlCache = new Map();
const missingIconCache = new Set();
const resolvingIconCache = new Set();

async function loadCoinIcons(){
  try{
    const data = await fetchJson("https://min-api.cryptocompare.com/data/all/coinlist?summary=true");
    if(data?.Data){
      for(const [symbol, item] of Object.entries(data.Data)){
        if(item?.ImageUrl){
          iconUrlCache.set(symbol.toUpperCase(), "https://www.cryptocompare.com" + item.ImageUrl);
        }
      }
      log("코인 아이콘 메타데이터 로드 완료");
    }
  }catch(e){
    log("코인 아이콘 메타데이터 실패, 보조 아이콘 사용");
  }
}

function defaultIconUrl(symbol){
  const mapped = ICON_SYMBOL_MAP[symbol] || symbol.toLowerCase();
  return `https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/svg/color/${mapped}.svg`;
}

function coinIconUrl(symbol){
  const s = String(symbol || "").toUpperCase();
  return iconUrlCache.get(s) || defaultIconUrl(s);
}

function badgeText(symbol){
  const s = String(symbol || "").toUpperCase();
  if(s.length <= 3) return s;
  return s.slice(0,2);
}

function coinBadgeHtml(symbol){
  const safe = String(symbol).replace(/"/g, "");
  return `<span class="coin-icon-wrap fallback loading" data-icon-symbol="${safe}"><span>${badgeText(safe)}</span></span>`;
}

function coinIconHtml(symbol){
  const safe = String(symbol).replace(/"/g, "");
  const url = coinIconUrl(safe);

  if(missingIconCache.has(safe)){
    return coinBadgeHtml(safe);
  }

  return `
    <span class="coin-icon-wrap resolved" data-icon-symbol="${safe}">
      <img
        class="coin-icon"
        src="${url}"
        loading="eager"
        onerror="
          missingIconCache.add('${safe}');
          this.parentElement.outerHTML=coinBadgeHtml('${safe}');
          requestAnimationFrame(hydrateVisibleIcons);
        "
      >
    </span>
  `;
}

async function resolveIconFromCoinGecko(symbol){
  const s = String(symbol || "").toUpperCase();
  if(iconUrlCache.has(s) || resolvingIconCache.has(s)) return;
  resolvingIconCache.add(s);

  try{
    const data = await fetchJson(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(s)}`);
    const coins = Array.isArray(data?.coins) ? data.coins : [];
    const exact = coins.find(c => String(c.symbol || "").toUpperCase() === s);
    const picked = exact || coins[0];

    const url = picked?.large || picked?.thumb || picked?.small;
    if(url){
      iconUrlCache.set(s, url);
      document.querySelectorAll(`[data-icon-symbol="${s}"]`).forEach(el => {
        el.className = "coin-icon-wrap resolved";
        el.innerHTML = `<img class="coin-icon" src="${url}" loading="eager" onerror="this.parentElement.outerHTML=coinBadgeHtml('${s}')">`;
      });
    }
  }catch(e){
    // 실패하면 배지 유지
  }finally{
    resolvingIconCache.delete(s);
  }
}

function hydrateVisibleIcons(){
  document.querySelectorAll(".coin-icon-wrap.fallback[data-icon-symbol]").forEach(el => {
    const symbol = el.getAttribute("data-icon-symbol");
    if(symbol && !iconUrlCache.has(symbol)){
      resolveIconFromCoinGecko(symbol);
    }
  });
}

function renderRows(el, rows, type){
  if(!rows.length){
    const emptyHtml = `<tr><td colspan="7" class="empty">&nbsp;</td></tr>`;
    if(el.innerHTML !== emptyHtml) el.innerHTML = emptyHtml;
    if(type === "kimchi") lastKimchiHtml = ""; else lastReverseHtml = "";
    return;
  }
  const nextHtml = rows.slice(0, MAX_ROWS).map(r => {
    const buyPriceHtml = priceDualHtml(r.buyPrice, "buy");
    const sellPriceHtml = priceDualHtml(r.sellPrice, "sell");
    return `
    <tr class="${r.grace ? 'grace-row' : ''}">
      <td class="coin">
        <div class="coin-cell">
          ${coinIconHtml(r.coin)}
          <span class="coin-symbol">${r.coin}</span>
        </div>
      </td>
      <td>${exchangeHtml(r.buyEx)}</td>
      <td class="num">${buyPriceHtml}</td>
      <td>${exchangeHtml(r.sellEx)}</td>
      <td class="num">${sellPriceHtml}</td>
      <td class="num ${r.grace ? '' : (type==='kimchi'?'green':'red')}">${krw(r.diff)}</td>
      <td class="num ${r.grace ? '' : (type==='kimchi'?'green':'red')}">${pct(r.percent)}</td>
    </tr>
  `}).join("");

  if(type === "kimchi"){
    if(nextHtml !== lastKimchiHtml){
      el.innerHTML = nextHtml;
      hydrateVisibleIcons();
      lastKimchiHtml = nextHtml;
    }
  }else{
    if(nextHtml !== lastReverseHtml){
      el.innerHTML = nextHtml;
      hydrateVisibleIcons();
      lastReverseHtml = nextHtml;
    }
  }
}

function calculate(){
  const kimchi = [];
  const reverse = [];

  for(const coin of COMMON_COINS){
    const d = getDomesticBest(coin);
    const foreignBuy = getForeignForBuy(coin);
    const foreignSell = getForeignForSell(coin);
    if(!d || !foreignBuy || !foreignSell) continue;

    // 김프: 해외 매수 → 국내 매도. 해외 매수가에는 달러 살 때 환율 적용
    if(d.high.price > foreignBuy.price){
      const diff = d.high.price - foreignBuy.price;
      const percent = diff / foreignBuy.price * 100;
      if(!isValidOpportunity(diff, percent)) continue;
      const row = {
        coin, buyEx:foreignBuy.ex, buyPrice:foreignBuy.price, sellEx:d.high.ex, sellPrice:d.high.price,
        diff, percent
      };
      if(!hasEnoughLiquidity(row)) continue;
      kimchi.push(row);
    }

    // 역프: 국내 매수 → 해외 매도. 해외 매도가에는 달러 팔 때 환율 적용
    if(foreignSell.price > d.low.price){
      const diff = foreignSell.price - d.low.price;
      const percent = diff / d.low.price * 100;
      if(!isValidOpportunity(diff, percent)) continue;
      const row = {
        coin, buyEx:d.low.ex, buyPrice:d.low.price, sellEx:foreignSell.ex, sellPrice:foreignSell.price,
        diff, percent
      };
      if(!hasEnoughLiquidity(row)) continue;
      reverse.push(row);
    }
  }

  const kimchiRows = dedupeRows(applyGraceRows("kimchi", dedupeRows(kimchi, "kimchi")), "kimchi");
  const reverseRows = dedupeRows(applyGraceRows("reverse", dedupeRows(reverse, "reverse")), "reverse");

  kimchiRows.sort((a,b)=>{
    if((a.grace ? 1 : 0) !== (b.grace ? 1 : 0)) return (a.grace ? 1 : 0) - (b.grace ? 1 : 0);
    return b.percent-a.percent;
  });

  reverseRows.sort((a,b)=>{
    if((a.grace ? 1 : 0) !== (b.grace ? 1 : 0)) return (a.grace ? 1 : 0) - (b.grace ? 1 : 0);
    return exposureScore(b)-exposureScore(a);
  });

  renderRows($("kimchiBody"), kimchiRows, "kimchi");
  renderRows($("reverseBody"), reverseRows, "reverse");
}


async function loadCommonCoins(){
  try{
    log("거래소 상장 목록 확인중...");

    const [
      upbitMarkets,
      bithumbMarkets,
      binanceInfo,
      bybitInfo,
      okxInfo,
      bitgetInfo
    ] = await Promise.allSettled([
      fetchJson("https://api.upbit.com/v1/market/all?isDetails=false"),
      fetchJson("https://api.bithumb.com/public/ticker/ALL_KRW"),
      fetchJson("https://api.binance.com/api/v3/exchangeInfo"),
      fetchJson("https://api.bybit.com/v5/market/instruments-info?category=spot"),
      fetchJson("https://www.okx.com/api/v5/public/instruments?instType=SPOT"),
      fetchJson("https://api.bitget.com/api/v2/spot/public/symbols")
    ]);

    const upbit = new Set();
    const bithumb = new Set();
    const binance = new Set();
    const bybit = new Set();
    const okx = new Set();
    const bitget = new Set();

    if(upbitMarkets.status === "fulfilled"){
      upbitMarkets.value
        .filter(m => m.market && m.market.startsWith("KRW-"))
        .forEach(m => upbit.add(m.market.replace("KRW-","").toUpperCase()));
    }

    if(bithumbMarkets.status === "fulfilled" && bithumbMarkets.value?.data){
      Object.keys(bithumbMarkets.value.data)
        .filter(k => k !== "date")
        .forEach(k => bithumb.add(k.toUpperCase()));
    }

    if(binanceInfo.status === "fulfilled" && Array.isArray(binanceInfo.value?.symbols)){
      binanceInfo.value.symbols
        .filter(s => s.status === "TRADING" && s.quoteAsset === "USDT")
        .forEach(s => binance.add(s.baseAsset.toUpperCase()));
    }

    if(bybitInfo.status === "fulfilled" && Array.isArray(bybitInfo.value?.result?.list)){
      bybitInfo.value.result.list
        .filter(s => s.status === "Trading" && s.quoteCoin === "USDT")
        .forEach(s => bybit.add(s.baseCoin.toUpperCase()));
    }

    if(okxInfo.status === "fulfilled" && Array.isArray(okxInfo.value?.data)){
      okxInfo.value.data
        .filter(s => s.state === "live" && s.quoteCcy === "USDT")
        .forEach(s => okx.add(s.baseCcy.toUpperCase()));
    }

    if(bitgetInfo.status === "fulfilled" && Array.isArray(bitgetInfo.value?.data)){
      bitgetInfo.value.data
        .filter(s => s.quoteCoin === "USDT")
        .forEach(s => bitget.add(s.baseCoin.toUpperCase()));
    }

    const domestic = new Set([...upbit, ...bithumb]);
    const foreign = new Set([...binance, ...bybit, ...okx, ...bitget]);

    COMMON_COINS = [...domestic].filter(c => foreign.has(c));

    if(COMMON_COINS.length < 5){
      COMMON_COINS = FALLBACK_COINS.filter(c => domestic.has(c) || foreign.has(c));
      if(COMMON_COINS.length < 5) COMMON_COINS = FALLBACK_COINS;
      log("상장 목록 일부 실패, 기본 공통 목록 사용");
    }else{
      log(`공통 코인 ${COMMON_COINS.length}개 확인 완료 · 거래대금 필터 적용`);
    }

    for(const ex of Object.keys(state.prices)){
      for(const coin of Object.keys(state.prices[ex])){
        if(!COMMON_COINS.includes(coin)) delete state.prices[ex][coin];
      }
      if(state.volumes?.[ex]){
        for(const coin of Object.keys(state.volumes[ex])){
          if(!COMMON_COINS.includes(coin)) delete state.volumes[ex][coin];
        }
      }
    }

  }catch(e){
    COMMON_COINS = FALLBACK_COINS;
    log("상장 목록 확인 실패, 기본 목록 사용");
  }
}

function domesticSubscribeCoins(){
  return [...new Set([...COMMON_COINS, "USDT"] )];
}

function connectUpbit(){
  if(!COMMON_COINS.length) return;
  try{
    const ws = new WebSocket("wss://api.upbit.com/websocket/v1");
    ws.binaryType = "arraybuffer";
    ws.onopen = () => {
      setServiceStatus("upbit", "ok"); log("Upbit WS 연결");
      ws.send(JSON.stringify([
        {ticket:"coin-monitoring"},
        {type:"ticker", codes:domesticSubscribeCoins().map(c=>"KRW-"+c)}
      ]));
    };
    ws.onmessage = async ev => {
      const text = new TextDecoder("utf-8").decode(ev.data);
      const data = JSON.parse(text);
      const coin = data.code?.replace("KRW-","");
      if(coin && data.trade_price) state.prices.upbit[coin] = data.trade_price;
      if(coin && data.acc_trade_price_24h) state.volumes.upbit[coin] = Number(data.acc_trade_price_24h);
      if(coin === "USDT") updateUsdtDisplay();
      calculate();
    };
    ws.onerror = () => { setServiceStatus("upbit", "error"); log("Upbit WS 오류"); };
    ws.onclose = () => { setServiceStatus("upbit", "error"); setTimeout(connectUpbit, 10000); };
    state.sockets.push(ws);
  }catch(e){ setServiceStatus("upbit", "error"); }
}

      }));
    };

      try{

        const content = data.content;
        if(content?.symbol && content?.closePrice){

          state.prices.bithumb[coin] = Number(content.closePrice);
          const bithumbValue =
            Number(content.value) ||
            Number(content.volumePower) ||
            (Number(content.closePrice) * Number(content.unitsTraded || content.volume || 0));
          if(Number.isFinite(bithumbValue) && bithumbValue > 0) state.volumes.bithumb[coin] = bithumbValue;
          calculate();

      }catch(e){
        setServiceStatus("bithumb", "error");

    ws.onerror = () => { setServiceStatus("bithumb", "error"); log("Bithumb WS 오류"); };

        args:COMMON_COINS.map(c=>`tickers.${c}USDT`)
      }));
    };
    ws.onmessage = ev => {
      const msg = JSON.parse(ev.data);
      const d = msg.data;
      if(d?.symbol && (d.lastPrice || d.lp)){
        const coin = d.symbol.replace("USDT","");
        state.prices.bybit[coin] = Number(d.lastPrice || d.lp);
        if(d.turnover24h) state.volumes.bybit[coin] = Number(d.turnover24h);
        calculate();
      }
    };
    ws.onerror = () => { setServiceStatus("bybit", "error"); log("Bybit WS 오류"); };
    ws.onclose = () => { setServiceStatus("bybit", "error"); setTimeout(connectBybit, 10000); };
    state.sockets.push(ws);
  }catch(e){ setServiceStatus("bybit", "error"); }
}
